<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <clipPath id="card-clip-ai">
      <rect width="800" height="450" rx="24" ry="24"/>
    </clipPath>
  </defs>
  <g clip-path="url(#card-clip-ai)">
    <!-- Background -->
    <rect width="800" height="450" fill="#0f1b3d"/>
    <!-- Top-right large blob -->
    <circle cx="720" cy="60" r="180" fill="#6c3fc5" opacity="0.85"/>
    <!-- Bottom-left circle -->
    <circle cx="130" cy="420" r="140" fill="#162050" opacity="1"/>
    <!-- Decorative lines -->
    <rect x="200" y="160" width="220" height="14" rx="7" fill="#3a5a9b" opacity="0.7"/>
    <rect x="200" y="192" width="160" height="14" rx="7" fill="#3a5a9b" opacity="0.7"/>
    <rect x="200" y="224" width="200" height="14" rx="7" fill="#3a5a9b" opacity="0.7"/>
    <!-- Star decoration -->
    <polygon points="560,120 568,144 594,144 574,158 582,182 560,168 538,182 546,158 526,144 552,144" fill="#f5c842"/>
    <!-- Icon box -->
    <rect x="570" y="210" width="160" height="160" rx="22" fill="#1a2550" opacity="0.9"/>
    <rect x="570" y="210" width="160" height="160" rx="22" fill="none" stroke="#7c5cdb" stroke-width="2.5"/>
    <!-- Brain/AI icon: neural network dots and lines -->
    <circle cx="620" cy="255" r="10" fill="#f5c842"/>
    <circle cx="650" cy="290" r="10" fill="#f5c842"/>
    <circle cx="680" cy="255" r="10" fill="#f5c842"/>
    <circle cx="650" cy="320" r="10" fill="#f5c842"/>
    <line x1="620" y1="255" x2="650" y2="290" stroke="#f5c842" stroke-width="3" opacity="0.7"/>
    <line x1="680" y1="255" x2="650" y2="290" stroke="#f5c842" stroke-width="3" opacity="0.7"/>
    <line x1="650" y1="290" x2="650" y2="320" stroke="#f5c842" stroke-width="3" opacity="0.7"/>
    <line x1="620" y1="255" x2="680" y2="255" stroke="#f5c842" stroke-width="3" opacity="0.7"/>
    <!-- Text -->
    <text x="80" y="340" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff">AI &amp; Data</text>
    <text x="80" y="378" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#8ab0e0">Intelligent Learning Track</text>
  </g>
</svg>
